name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build release artifacts
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-linux-gnu.2.31
            arch: x86_64
          - target: aarch64-linux-gnu.2.31
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Run tests
        run: zig build test

      - name: Build ${{ matrix.arch }}
        run: zig build -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }}

      - name: Package
        run: |
          name="cliptux-${GITHUB_REF_NAME}-linux-${{ matrix.arch }}"
          mkdir -p "dist/$name"
          cp zig-out/bin/cliptux cliptux.desktop cliptux.svg README.md LICENSE "dist/$name/"
          tar -C dist -czf "$name.tar.gz" "$name"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: cliptux-*.tar.gz
          generate_release_notes: true
