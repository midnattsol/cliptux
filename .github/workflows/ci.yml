name: CI

on:
  # PRs are the primary gate; the push trigger covers direct pushes to main
  # and verifies the actual merge result (PR runs test the PR head only)
  pull_request:
    branches: [main]
  push:
    branches: [main]

# supersede in-flight runs when new commits land on the same ref
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Check formatting
        run: zig fmt --check src build.zig

      - name: Run tests
        run: zig build test

      - name: Build (native, ReleaseSafe)
        run: zig build -Doptimize=ReleaseSafe

      - name: Cross-compile x86_64
        run: zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-linux-gnu.2.31

      - name: Cross-compile arm64
        run: zig build -Doptimize=ReleaseSafe -Dtarget=aarch64-linux-gnu.2.31
