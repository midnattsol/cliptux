name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Check formatting
        run: zig fmt --check src build.zig

      - name: Run tests
        run: zig build test

      - name: Build (native, ReleaseSafe)
        run: zig build -Doptimize=ReleaseSafe

      - name: Cross-compile x86_64
        run: zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-linux-gnu.2.31

      - name: Cross-compile arm64
        run: zig build -Doptimize=ReleaseSafe -Dtarget=aarch64-linux-gnu.2.31
